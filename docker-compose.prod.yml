# Party Hall SaaS – Docker Compose (Production)
# Adds Nginx reverse proxy on top of dev stack.
# Run: docker-compose -f docker-compose.prod.yml up --build -d

version: '3.9'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: partyhub_db
    restart: always
    environment:
      POSTGRES_DB: partyhub_db
      POSTGRES_USER: partyhub
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U partyhub -d partyhub_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: partyhub_redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: partyhub_backend
    restart: always
    env_file: ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      DEBUG: "False"
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        daphne -b 0.0.0.0 -p 8000 config.asgi:application
      "

  frontend:
    build:
      context: ./party-hall-saas
      dockerfile: Dockerfile.prod
    container_name: partyhub_frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_WS_URL: wss://yourdomain.com
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: partyhub_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_static:/static:ro
      - backend_media:/media:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  backend_media:
  backend_static:
