# Party Hall SaaS – Docker Compose (Development)
# Services:
#   db       → PostgreSQL 16 + PostGIS 3.4
#   redis    → Redis 7 (Django Channels layer)
#   backend  → Django 5.2 + Daphne ASGI (HTTP + WebSocket)
#   frontend → Next.js 16 dev server

services:
  # ──────────────────────────────────────────────────────────
  # 1. PostgreSQL 16 + PostGIS
  # ──────────────────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    container_name: partyhub_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: partyhub_db
      POSTGRES_USER: partyhub
      POSTGRES_PASSWORD: partyhub_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U partyhub -d partyhub_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # 2. Redis 7 (Django Channels channel layer)
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: partyhub_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # 3. Django Backend (Daphne ASGI — HTTP + WebSocket)
  # ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: partyhub_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        daphne -b 0.0.0.0 -p 8000 config.asgi:application
      "

  # ──────────────────────────────────────────────────────────
  # 4. Next.js Frontend (dev)
  # ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./party-hall-saas
      dockerfile: Dockerfile
    container_name: partyhub_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000/api
      NEXT_PUBLIC_WS_URL: ws://127.0.0.1:8000
    env_file: ./party-hall-saas/.env.local
    volumes:
      - ./party-hall-saas:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
